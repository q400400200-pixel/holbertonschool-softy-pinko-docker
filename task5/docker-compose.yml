services: 
  back-end:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    image: back-end-app
  front-end:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    image: front-end-app
  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    image: softy-pinko-proxy:task5
    ports:
      - "80:80"
    depends_on:
      - back-end
      - front-end
